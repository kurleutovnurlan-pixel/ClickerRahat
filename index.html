<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Clicker</title>
    
    <style>
        /* Стили: делаем красиво */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1e1e2f, #2d2d44);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #score-container {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        #click-button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: none;
            background: radial-gradient(circle, #ff416c, #ff4b2b);
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        #click-button:active {
            transform: scale(0.9);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.5);
        }

        #click-button:hover {
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <div id="score-container">Счёт: <span id="score">0</span></div>
    <button id="click-button">КЛИК!</button>

    <script>
        // Логика: считаем клики
        let count = 0;
        const scoreDisplay = document.getElementById('score');
        const button = document.getElementById('click-button');

        button.addEventListener('click', () => {
            count++;
            scoreDisplay.textContent = count;
            
            // Маленький эффект: меняем цвет текста при каждом 10-м клике
            if (count % 10 === 0) {
                scoreDisplay.style.color = '#00ffcc';
            } else {
                scoreDisplay.style.color = 'white';
            }
        });
    </script>

</body>
</html>
