<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clicker Empire: God Tier</title>
    <style>
        :root { --neon: #00ffcc; --bg: #0b0b14; }
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; background: var(--bg); color: white;
            font-family: 'Segoe UI', sans-serif; user-select: none; transition: 0.3s;
            touch-action: manipulation; overflow-x: hidden;
        }

        /* Прогресс-бар */
        #progress-wrapper { width: 90%; max-width: 400px; height: 10px; background: #222; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--neon); transition: 0.3s; box-shadow: 0 0 10px var(--neon); }

        #score-container { font-size: clamp(40px, 10vw, 60px); font-weight: 900; color: var(--neon); margin: 5px 0; text-shadow: 0 0 15px rgba(0, 255, 204, 0.3); }
        .lvl-tag { font-size: 14px; color: #ffeb3b; text-transform: uppercase; margin-bottom: 15px; }

        #click-button {
            width: clamp(140px, 40vw, 180px); height: clamp(140px, 40vw, 180px);
            border-radius: 50%; border: 8px solid #333; background: #1a1a2e; color: white;
            font-size: 20px; font-weight: bold; cursor: pointer; transition: transform 0.05s;
            box-shadow: 0 0 40px rgba(0,0,0,0.6); position: relative; z-index: 10;
        }
        #click-button:active { transform: scale(0.9); border-color: var(--neon); }
        .adr-active { background: #441111 !important; box-shadow: 0 0 60px red !important; }

        /* Магазин и сетка */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 95%; max-width: 450px; margin-top: 10px; }
        .btn {
            background: #1e1e2f; border: 1px solid #333; color: white; padding: 12px;
            border-radius: 12px; cursor: pointer; font-size: 12px; display: flex; flex-direction: column; align-items: center;
        }
        .btn:disabled { opacity: 0.3; filter: grayscale(1); }
        .btn b { color: var(--neon); margin-top: 4px; }
        .special { border-color: #ff00ff; background: #2a1a3a; }

        /* Рулетка и Престиж */
        .extra-box { width: 90%; max-width: 400px; margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; border: 1px solid #444; text-align: center; }
        .roll-btn { background: #ff9800; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        
        #prestige-btn { background: #ffd700; color: black; display: none; }

        /* Эффекты */
        .floating-text { position: absolute; font-weight: bold; pointer-events: none; animation: moveUp 0.8s forwards; z-index: 100; }
        .particle { position: absolute; width: 6px; height: 6px; background: var(--neon); pointer-events: none; border-radius: 50%; animation: explode 0.5s ease-out forwards; }
        
        @keyframes moveUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
        @keyframes explode { 0% { transform: scale(1); opacity: 1; } 100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; } }
        .shake { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(0,0); } }

        .footer { margin-top: 30px; display: flex; gap: 15px; padding-bottom: 30px; }
        .nav-btn { background: none; border: 1px solid #444; color: #888; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body id="main-body">

    <div id="progress-wrapper"><div id="progress-fill"></div></div>
    <div class="lvl-tag" id="lvl-name">Новичок (Престиж: 0)</div>
    <div id="score-container">0</div>
    <div style="font-size: 14px; color: #888; margin-bottom: 15px;" id="stats">Клик: 1 | Авто: 0/с</div>

    <button id="click-button">КЛИК!</button>

    <div class="extra-box">
        <div id="prestige-info" style="font-size: 11px; margin-bottom: 5px; color: #ffd700;"></div>
        <button class="roll-btn" id="prestige-btn" onclick="doPrestige()">ПЕРЕРОЖДЕНИЕ (БОНУС +100%)</button>
        
        <div style="font-size: 12px; margin-top: 10px;">🎰 РУЛЕТКА (Цена: <span id="r-price">100</span>)</div>
        <div id="r-res" style="font-size: 13px; color: #ffeb3b; margin: 5px 0;">Удача или провал?</div>
        <button class="roll-btn" id="btn-roll" onclick="roll()">КРУТИТЬ</button>
    </div>

    <div class="grid">
        <button class="btn" id="btn-c1" onclick="buy('c1', 1, 'click')">Палец (+1) <b id="pr-c1">15</b></button>
        <button class="btn" id="btn-a1" onclick="buy('a1', 1, 'auto')">Курсор (+1/с) <b id="pr-a1">50</b></button>
        <button class="btn" id="btn-c2" onclick="buy('c2', 10, 'click')">Меч (+10) <b id="pr-c2">500</b></button>
        <button class="btn" id="btn-a2" onclick="buy('a2', 15, 'auto')">Ферма (+15/с) <b id="pr-a2">2000</b></button>
        <button class="btn" id="btn-c3" onclick="buy('c3', 100, 'click')">Завод (+100) <b id="pr-c3">10000</b></button>
        <button class="btn" id="btn-a3" onclick="buy('a3', 150, 'auto')">ИИ (+150/с) <b id="pr-a3">50000</b></button>
        <button class="btn special" id="btn-crit" onclick="buySpecial('crit', 1500)">Крит (х5) <b id="pr-crit">1500</b></button>
        <button class="btn special" id="btn-boost" onclick="activateAdrenaline()">Адреналин (х2) <b id="pr-boost">5000</b></button>
    </div>

    <div class="footer">
        <button class="nav-btn" onclick="shareProgress()">ПОДЕЛИТЬСЯ</button>
        <button class="nav-btn" onclick="resetGame()" style="color: #633;">СБРОС</button>
    </div>

    <script>
        let score, cPower, aPower, rPrice, multipliers, prices, prestige;
        let adrMult = 1;

        function load() {
            score = parseFloat(localStorage.getItem('score')) || 0;
            cPower = parseInt(localStorage.getItem('cPower')) || 1;
            aPower = parseInt(localStorage.getItem('aPower')) || 0;
            rPrice = parseInt(localStorage.getItem('rPrice')) || 100;
            prestige = parseInt(localStorage.getItem('prestige')) || 0;
            multipliers = JSON.parse(localStorage.getItem('multipliers')) || { crit: false };
            prices = JSON.parse(localStorage.getItem('prices')) || { c1:15, a1:50, c2:500, a2:2000, c3:10000, a3:50000, crit:1500, boost:5000 };
            update();
        }

        function update() {
            let bonus = 1 + prestige;
            document.getElementById('score-container').textContent = Math.floor(score);
            document.getElementById('stats').textContent = `Клик: ${(cPower * adrMult * bonus).toFixed(0)} | Авто: ${(aPower * adrMult * bonus).toFixed(1)}/с`;
            document.getElementById('r-price').textContent = rPrice;
            document.getElementById('lvl-name').textContent = getLvlName() + ` (Престиж: ${prestige})`;

            // Прогресс бар
            let nextGoal = Math.pow(10, Math.floor(Math.log10(score + 1)) + 1);
            if(nextGoal < 100) nextGoal = 100;
            document.getElementById('progress-fill').style.width = Math.min((score / nextGoal) * 100, 100) + "%";

            // Магазин
            for(let key in prices) {
                let el = document.getElementById('pr-' + key);
                if(el) el.textContent = prices[key];
                let btn = document.getElementById('btn-' + key);
                if(btn) btn.disabled = score < prices[key];
            }
            document.getElementById('btn-roll').disabled = score < rPrice;
            if(multipliers.crit) { document.getElementById('btn-crit').style.background = "#004422"; document.getElementById('btn-crit').disabled = true; }

            // Престиж доступен от 1 млн
            if(score >= 1000000) {
                document.getElementById('prestige-btn').style.display = "block";
                document.getElementById('prestige-info').textContent = "Готов стать в 2 раза сильнее?";
            } else {
                document.getElementById('prestige-btn').style.display = "none";
            }

            save();
        }

        function getLvlName() {
            if(score < 1000) return "Новичок";
            if(score < 50000) return "Кликер-Мастер";
            if(score < 500000) return "Олигарх";
            return "Легендарный Император";
        }

        function save() {
            localStorage.setItem('score', score);
            localStorage.setItem('cPower', cPower);
            localStorage.setItem('aPower', aPower);
            localStorage.setItem('rPrice', rPrice);
            localStorage.setItem('prestige', prestige);
            localStorage.setItem('prices', JSON.stringify(prices));
            localStorage.setItem('multipliers', JSON.stringify(multipliers));
        }

        document.getElementById('click-button').onclick = (e) => {
            let power = cPower * adrMult * (1 + prestige);
            let col = "#00ffcc";
            if(multipliers.crit && Math.random() < 0.2) {
                power *= 5; col = "#ffeb3b";
                document.body.classList.add('shake');
                setTimeout(() => document.body.classList.remove('shake'), 100);
            }
            score += power;
            spawnText(e.clientX, e.clientY, '+' + Math.floor(power), col);
            spawnParticles(e.clientX, e.clientY);
            update();
        };

        function buy(id, val, type) {
            if(score >= prices[id]) {
                score -= prices[id];
                if(type === 'click') cPower += val; else aPower += val;
                prices[id] = Math.round(prices[id] * 1.6);
                update();
            }
        }

        function buySpecial(type, cost) {
            if(score >= prices[type] && !multipliers[type]) {
                score -= prices[type];
                multipliers[type] = true;
                update();
            }
        }

        function activateAdrenaline() {
            if(score >= prices.boost) {
                score -= prices.boost;
                adrMult = 2;
                document.body.classList.add('adr-active');
                prices.boost = Math.round(prices.boost * 3);
                update();
                setTimeout(() => { adrMult = 1; document.body.classList.remove('adr-active'); update(); }, 10000);
            }
        }

        function roll() {
            if(score >= rPrice) {
                score -= rPrice;
                let chance = Math.random();
                let res = document.getElementById('r-res');
                if(chance < 0.15) {
                    let win = rPrice * 10; score += win;
                    res.textContent = "ДЖЕКПОТ! +" + win; res.style.color = "#ffeb3b";
                } else if(chance < 0.55) {
                    let win = Math.round(rPrice * 2.5); score += win;
                    res.textContent = "УДАЧА! +" + win; res.style.color = "#00ffcc";
                } else {
                    res.textContent = "ПОТЕРЯНО..."; res.style.color = "#ff5252";
                }
                rPrice = Math.round(rPrice * 1.4);
                update();
            }
        }

        function doPrestige() {
            if(confirm("Перерождение сбросит весь прогресс, но даст постоянный бонус +100% к доходу. Уверен?")) {
                prestige++;
                score = 0; cPower = 1; aPower = 0; rPrice = 100;
                multipliers = { crit: false };
                prices = { c1:15, a1:50, c2:500, a2:2000, c3:10000, a3:50000, crit:1500, boost:5000 };
                update();
            }
        }

        function spawnText(x, y, txt, col) {
            let el = document.createElement('div'); el.className = 'floating-text';
            el.textContent = txt; el.style.left = x + 'px'; el.style.top = y + 'px'; el.style.color = col;
            document.body.appendChild(el); setTimeout(() => el.remove(), 800);
        }

        function spawnParticles(x, y) {
            for(let i=0; i<6; i++) {
                let p = document.createElement('div'); p.className = 'particle';
                p.style.left = x + 'px'; p.style.top = y + 'px';
                p.style.setProperty('--dx', (Math.random()*100 - 50) + 'px');
                p.style.setProperty('--dy', (Math.random()*100 - 50) + 'px');
                document.body.appendChild(p); setTimeout(() => p.remove(), 500);
            }
        }

        setInterval(() => { if(aPower > 0) { score += (aPower * adrMult * (1 + prestige))/10; update(); } }, 100);
        function resetGame() { if(confirm("Сбросить?")) { localStorage.clear(); location.reload(); } }
        function shareProgress() {
            const text = `В Clicker Empire мой Престиж: ${prestige}! Очков: ${Math.floor(score)}. Попробуй обойти: ${window.location.href}`;
            navigator.clipboard.writeText(text).then(() => alert("Скопировано!"));
        }
        load();
    </script>
</body>
</html>
