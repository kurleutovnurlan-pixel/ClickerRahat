<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker Evolution: Special Tech</title>
    <style>
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; background: #0f0f1a; color: white;
            font-family: 'Segoe UI', sans-serif; transition: 0.3s; user-select: none;
        }

        #score-container { font-size: 60px; font-weight: 900; color: #00ffcc; margin: 10px 0; text-shadow: 0 0 20px rgba(0, 255, 204, 0.3); }
        .stat-bar { font-size: 14px; color: #888; margin-bottom: 15px; }

        #click-button {
            width: 150px; height: 150px; border-radius: 50%; border: 6px solid #333;
            background: #1a1a2e; color: white; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: transform 0.05s; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        #click-button:active { transform: scale(0.9); border-color: #ff00ff; }

        /* Спец-эффект адреналина */
        .adrenaline-active { background: #441111 !important; box-shadow: 0 0 50px red !important; }

        .section-title { margin-top: 25px; font-size: 14px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 360px; margin-top: 10px; }

        .btn {
            background: #1e1e2f; border: 1px solid #333; color: white; padding: 10px;
            border-radius: 8px; cursor: pointer; font-size: 12px; display: flex; flex-direction: column;
        }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn b { color: #ffeb3b; margin-top: 4px; }
        .special { border-color: #ff00ff; background: #2a1a3a; }

        .floating-text { position: absolute; font-weight: bold; pointer-events: none; animation: moveUp 0.8s forwards; }
        @keyframes moveUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="score-container">0</div>
    <div class="stat-bar" id="stats">Клик: 1 | Авто: 0/с</div>

    <button id="click-button">КЛИК!</button>

    <div class="section-title">Магазин</div>
    <div class="grid">
        <button class="btn" onclick="buy('c1', 1, 'click')">Сила +1 <b id="pr-c1">15</b></button>
        <button class="btn" onclick="buy('a1', 1, 'auto')">Авто +1 <b id="pr-a1">50</b></button>
    </div>

    <div class="section-title">Особые технологии</div>
    <div class="grid">
        <button class="btn special" id="btn-crit" onclick="buySpecial('crit', 1000)">
            Критический клик (х5) <b id="pr-crit">1000</b>
        </button>
        <button class="btn special" id="btn-luck" onclick="buySpecial('luck', 2500)">
            Магнит удачи <b id="pr-luck">2500</b>
        </button>
        <button class="btn special" id="btn-boost" onclick="activateAdrenaline()">
            Адреналин (x2 на 10с) <b id="pr-boost">5000</b>
        </button>
        <button class="btn special" id="btn-sale" onclick="buySpecial('sale', 10000)">
            Скидочная карта (-20%) <b id="pr-sale">10000</b>
        </button>
    </div>

    <div style="margin-top: 30px; opacity: 0.5; font-size: 10px;">
        <button onclick="resetGame()">Сброс данных</button>
    </div>

    <script>
        let score = parseFloat(localStorage.getItem('score')) || 0;
        let cPower = parseInt(localStorage.getItem('cPower')) || 1;
        let aPower = parseInt(localStorage.getItem('aPower')) || 0;
        let multipliers = JSON.parse(localStorage.getItem('multipliers')) || { crit: false, luck: false, sale: 1 };
        let prices = JSON.parse(localStorage.getItem('prices')) || { c1: 15, a1: 50, crit: 1000, luck: 2500, boost: 5000, sale: 10000 };
        
        let adrenalineMult = 1;

        function update() {
            document.getElementById('score-container').textContent = Math.floor(score);
            document.getElementById('stats').textContent = `Клик: ${cPower * adrenalineMult} | Авто: ${(aPower * adrenalineMult).toFixed(1)}/с`;
            
            // Обновление цен
            for(let key in prices) {
                let el = document.getElementById('pr-' + key);
                if(el) el.textContent = Math.round(prices[key] * multipliers.sale);
            }

            // Проверка доступности
            document.querySelectorAll('.btn').forEach(btn => {
                let id = btn.onclick.toString().match(/'(.*?)'/)[1];
                btn.disabled = score < (prices[id] * multipliers.sale);
            });

            // Если уже куплено
            if(multipliers.crit) document.getElementById('btn-crit').style.background = "#004422";
            if(multipliers.luck) document.getElementById('btn-luck').style.background = "#004422";

            save();
        }

        function save() {
            localStorage.setItem('score', score);
            localStorage.setItem('cPower', cPower);
            localStorage.setItem('aPower', aPower);
            localStorage.setItem('prices', JSON.stringify(prices));
            localStorage.setItem('multipliers', JSON.stringify(multipliers));
        }

        document.getElementById('click-button').onclick = (e) => {
            let currentClick = cPower * adrenalineMult;
            let color = "#00ffcc";
            
            if(multipliers.crit && Math.random() < 0.2) {
                currentClick *= 5;
                color = "#ffeb3b";
                showText(e.clientX, e.clientY - 20, "КРИТ!", "#ff0000");
            }

            score += currentClick;
            showText(e.clientX, e.clientY, '+' + currentClick, color);
            update();
        };

        function buy(id, val, type) {
            let cost = Math.round(prices[id] * multipliers.sale);
            if(score >= cost) {
                score -= cost;
                if(type === 'click') cPower += val; else aPower += val;
                prices[id] = Math.round(prices[id] * 1.6);
                update();
            }
        }

        function buySpecial(type, cost) {
            let finalCost = Math.round(cost * multipliers.sale);
            if(score >= finalCost && !multipliers[type]) {
                score -= finalCost;
                if(type === 'sale') multipliers.sale = 0.8;
                else multipliers[type] = true;
                update();
            }
        }

        function activateAdrenaline() {
            let cost = Math.round(prices.boost * multipliers.sale);
            if(score >= cost) {
                score -= cost;
                adrenalineMult = 2;
                document.body.classList.add('adrenaline-active');
                prices.boost = Math.round(prices.boost * 2);
                update();
                setTimeout(() => {
                    adrenalineMult = 1;
                    document.body.classList.remove('adrenaline-active');
                    update();
                }, 10000);
            }
        }

        function showText(x, y, txt, col) {
            let el = document.createElement('div');
            el.className = 'floating-text';
            el.textContent = txt; el.style.left = x + 'px'; el.style.top = y + 'px'; el.style.color = col;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        setInterval(() => { if(aPower > 0) { score += (aPower * adrenalineMult)/10; update(); } }, 100);
        function resetGame() { localStorage.clear(); location.reload(); }

        update();
    </script>
</body>
</html>
