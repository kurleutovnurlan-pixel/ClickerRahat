<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker Empire: Full Edition</title>
    <style>
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; background: #0b0b14; color: white;
            font-family: 'Segoe UI', sans-serif; user-select: none; transition: 0.5s;
        }
        #score-container { font-size: 50px; font-weight: 900; color: #00ffcc; margin: 10px 0; text-shadow: 0 0 20px rgba(0, 255, 204, 0.3); }
        .stat-bar { font-size: 14px; color: #888; margin-bottom: 10px; }

        #click-button {
            width: 140px; height: 140px; border-radius: 50%; border: 6px solid #333;
            background: #1a1a2e; color: white; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: transform 0.05s; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        #click-button:active { transform: scale(0.9); border-color: #00ffcc; }
        .adr-active { background: #441111 !important; box-shadow: 0 0 50px red !important; }

        .section-title { margin-top: 20px; font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; }

        /* Сетка магазина */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 360px; margin-top: 8px; }
        .btn {
            background: #1e1e2f; border: 1px solid #333; color: white; padding: 10px;
            border-radius: 8px; cursor: pointer; font-size: 11px; display: flex; flex-direction: column;
        }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn b { color: #00ffcc; margin-top: 3px; }
        .special { border-color: #ff00ff; background: #2a1a3a; }

        /* Рулетка */
        .roulette { margin-top: 20px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; border: 1px dashed #444; width: 340px; }
        .roll-btn { background: #ff9800; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 5px; }

        .floating-text { position: absolute; font-weight: bold; pointer-events: none; animation: moveUp 0.8s forwards; z-index: 100; }
        @keyframes moveUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
        
        .nav-btns { margin-top: 25px; display: flex; gap: 10px; }
        .nav-btn { background: #333; border: none; color: #888; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div id="score-container">0</div>
    <div class="stat-bar" id="stats">Клик: 1 | Авто: 0/с</div>

    <button id="click-button">КЛИК!</button>

    <div class="roulette">
        <div style="font-size: 12px;">🎰 УДАЧА (Цена: <span id="r-price">100</span>)</div>
        <div id="r-res" style="font-size: 13px; color: #ffeb3b; margin: 4px 0;">Рискнешь?</div>
        <button class="roll-btn" id="btn-roll" onclick="roll()">ИСПЫТАТЬ</button>
    </div>

    <div class="section-title">Магазин улучшений</div>
    <div class="grid">
        <button class="btn" id="btn-c1" onclick="buy('c1', 1, 'click')">Палец (+1) <b id="pr-c1">15</b></button>
        <button class="btn" id="btn-a1" onclick="buy('a1', 1, 'auto')">Курсор (+1/с) <b id="pr-a1">50</b></button>
        <button class="btn" id="btn-c2" onclick="buy('c2', 10, 'click')">Меч (+10) <b id="pr-c2">500</b></button>
        <button class="btn" id="btn-a2" onclick="buy('a2', 15, 'auto')">Ферма (+15/с) <b id="pr-a2">2000</b></button>
        <button class="btn" id="btn-c3" onclick="buy('c3', 100, 'click')">Завод (+100) <b id="pr-c3">10000</b></button>
        <button class="btn" id="btn-a3" onclick="buy('a3', 150, 'auto')">ИИ (+150/с) <b id="pr-a3">50000</b></button>
    </div>

    <div class="section-title">Особые технологии</div>
    <div class="grid">
        <button class="btn special" id="btn-crit" onclick="buySpecial('crit', 1500)">Критический клик (х5) <b id="pr-crit">1500</b></button>
        <button class="btn special" id="btn-boost" onclick="activateAdrenaline()">Адреналин (x2 на 10с) <b id="pr-boost">5000</b></button>
    </div>

    <div class="nav-btns">
        <button class="nav-btn" onclick="shareProgress()">ПОДЕЛИТЬСЯ</button>
        <button class="nav-btn" onclick="resetGame()" style="color: #622;">СБРОС</button>
    </div>

    <script>
        let score = parseFloat(localStorage.getItem('score')) || 0;
        let cPower = parseInt(localStorage.getItem('cPower')) || 1;
        let aPower = parseInt(localStorage.getItem('aPower')) || 0;
        let rPrice = parseInt(localStorage.getItem('rPrice')) || 100;
        let multipliers = JSON.parse(localStorage.getItem('multipliers')) || { crit: false };
        let prices = JSON.parse(localStorage.getItem('prices')) || { c1:15, a1:50, c2:500, a2:2000, c3:10000, a3:50000, crit:1500, boost:5000 };
        
        let adrMult = 1;

        function update() {
            document.getElementById('score-container').textContent = Math.floor(score);
            document.getElementById('stats').textContent = `Клик: ${cPower * adrMult} | Авто: ${(aPower * adrMult).toFixed(1)}/с`;
            document.getElementById('r-price').textContent = rPrice;

            for(let key in prices) {
                let el = document.getElementById('pr-' + key);
                if(el) el.textContent = prices[key];
                let btn = document.getElementById('btn-' + key);
                if(btn) btn.disabled = score < prices[key];
            }
            document.getElementById('btn-roll').disabled = score < rPrice;
            if(multipliers.crit) {
                document.getElementById('btn-crit').style.background = "#004422";
                document.getElementById('btn-crit').disabled = true;
            }
            save();
        }

        function save() {
            localStorage.setItem('score', score);
            localStorage.setItem('cPower', cPower);
            localStorage.setItem('aPower', aPower);
            localStorage.setItem('rPrice', rPrice);
            localStorage.setItem('prices', JSON.stringify(prices));
            localStorage.setItem('multipliers', JSON.stringify(multipliers));
        }

        document.getElementById('click-button').onclick = (e) => {
            let power = cPower * adrMult;
            let col = "#00ffcc";
            if(multipliers.crit && Math.random() < 0.2) {
                power *= 5; col = "#ffeb3b";
                showText(e.clientX, e.clientY - 20, "КРИТ!", "#ff0000");
            }
            score += power;
            showText(e.clientX, e.clientY, '+' + power, col);
            update();
        };

        function buy(id, val, type) {
            if(score >= prices[id]) {
                score -= prices[id];
                if(type === 'click') cPower += val; else aPower += val;
                prices[id] = Math.round(prices[id] * 1.6);
                update();
            }
        }

        function buySpecial(type, cost) {
            if(score >= prices[type] && !multipliers[type]) {
                score -= prices[type];
                multipliers[type] = true;
                update();
            }
        }

        function activateAdrenaline() {
            if(score >= prices.boost) {
                score -= prices.boost;
                adrMult = 2;
                document.body.classList.add('adr-active');
                prices.boost = Math.round(prices.boost * 2.5);
                update();
                setTimeout(() => {
                    adrMult = 1;
                    document.body.classList.remove('adr-active');
                    update();
                }, 10000);
            }
        }

        function roll() {
            if(score >= rPrice) {
                score -= rPrice;
                let chance = Math.random();
                let res = document.getElementById('r-res');
                if(chance < 0.15) {
                    let win = rPrice * 7; score += win;
                    res.textContent = "ДЖЕКПОТ! +" + win; res.style.color = "#ffeb3b";
                } else if(chance < 0.5) {
                    let win = Math.round(rPrice * 2); score += win;
                    res.textContent = "ВЫИГРЫШ! +" + win; res.style.color = "#00ffcc";
                } else {
                    res.textContent = "ПУСТО..."; res.style.color = "#ff5252";
                }
                rPrice = Math.round(rPrice * 1.3);
                update();
            }
        }

        function showText(x, y, txt, col) {
            let el = document.createElement('div');
            el.className = 'floating-text';
            el.textContent = txt; el.style.left = x + 'px'; el.style.top = y + 'px'; el.style.color = col;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        setInterval(() => { if(aPower > 0) { score += (aPower * adrMult)/10; update(); } }, 100);
        function resetGame() { if(confirm("Сброс?")) { localStorage.clear(); location.reload(); } }
        function shareProgress() {
            const text = `В Clicker Empire у меня ${Math.floor(score)} очков! Сможешь больше? ${window.location.href}`;
            navigator.clipboard.writeText(text).then(() => alert("Текст скопирован!"));
        }
        update();
    </script>
</body>
</html>
