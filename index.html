<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Clicker Pro + Share</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle, #1a1a2e, #0f0f1a);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #score-container {
            font-size: 64px;
            font-weight: 900;
            color: #00ffcc;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }

        .stat {
            font-size: 18px;
            color: #888;
            margin-bottom: 25px;
        }

        #click-button {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 8px solid #333;
            background: #222;
            color: white;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.05s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        #click-button:active { transform: scale(0.9); border-color: #00ffcc; }

        .shop {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 280px;
        }

        .upgrade-btn {
            background: #252535;
            border: 2px solid #444;
            color: white;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        .upgrade-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .share-btn {
            margin-top: 15px;
            background: #007bff;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .floating-text {
            position: absolute;
            color: #00ffcc;
            font-weight: bold;
            pointer-events: none;
            animation: moveUp 0.8s ease-out forwards;
        }

        @keyframes moveUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="score-container">0</div>
    <div class="stat">Клик: +<span id="per-click">1</span> | Авто: <span id="auto-val">0</span>/сек</div>

    <button id="click-button">КЛИК!</button>

    <div class="shop">
        <button class="upgrade-btn" id="upg-click">
            <span>Сила клика</span> <span id="price-click">15</span>
        </button>
        <button class="upgrade-btn" id="upg-auto">
            <span>Авто-клик</span> <span id="price-auto">50</span>
        </button>
        
        <button class="share-btn" onclick="shareProgress()">ПОДЕЛИТЬСЯ РЕЗУЛЬТАТОМ</button>
        
        <button class="upgrade-btn" style="background:#442222; margin-top: 20px;" onclick="resetGame()">
            <span>СБРОСИТЬ ВСЁ</span>
        </button>
    </div>

    <script>
        // Загрузка или стандарт
        let score, clickPower, autoClick, clickPrice, autoPrice;

        function loadData() {
            score = parseFloat(localStorage.getItem('score')) || 0;
            clickPower = parseInt(localStorage.getItem('clickPower')) || 1;
            autoClick = parseInt(localStorage.getItem('autoClick')) || 0;
            clickPrice = parseInt(localStorage.getItem('clickPrice')) || 15;
            autoPrice = parseInt(localStorage.getItem('autoPrice')) || 50;
        }

        function updateDisplay() {
            document.getElementById('score-container').textContent = Math.floor(score);
            document.getElementById('per-click').textContent = clickPower;
            document.getElementById('auto-val').textContent = autoClick;
            document.getElementById('price-click').textContent = clickPrice;
            document.getElementById('price-auto').textContent = autoPrice;
            
            document.getElementById('upg-click').disabled = score < clickPrice;
            document.getElementById('upg-auto').disabled = score < autoPrice;

            localStorage.setItem('score', score);
            localStorage.setItem('clickPower', clickPower);
            localStorage.setItem('autoClick', autoClick);
            localStorage.setItem('clickPrice', clickPrice);
            localStorage.setItem('autoPrice', autoPrice);
        }

        function spawnText(x, y, text) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.textContent = '+' + text;
            el.style.left = x + 'px'; el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        document.getElementById('click-button').addEventListener('click', (e) => {
            score += clickPower;
            spawnText(e.clientX, e.clientY, clickPower);
            updateDisplay();
        });

        document.getElementById('upg-click').addEventListener('click', () => {
            if (score >= clickPrice) {
                score -= clickPrice;
                clickPower++;
                clickPrice = Math.round(clickPrice * 1.6);
                updateDisplay();
            }
        });

        document.getElementById('upg-auto').addEventListener('click', () => {
            if (score >= autoPrice) {
                score -= autoPrice;
                autoClick++;
                autoPrice = Math.round(autoPrice * 1.8);
                updateDisplay();
            }
        });

        setInterval(() => {
            if (autoClick > 0) {
                score += autoClick;
                updateDisplay();
            }
        }, 1000);

        // ФИКС СБРОСА
        function resetGame() {
            if(confirm("Точно сбросить весь прогресс?")) {
                localStorage.clear();
                loadData(); // Перезагружаем переменные в коде
                updateDisplay(); // Обновляем экран
                alert("Прогресс обнулен!");
            }
        }

        // ФУНКЦИЯ ПОДЕЛИТЬСЯ
        function shareProgress() {
            const text = `Я набрал ${Math.floor(score)} очков в ClickerRahat! Моя сила клика: ${clickPower}. Попробуй обойти меня: ${window.location.href}`;
            navigator.clipboard.writeText(text).then(() => {
                alert("Текст скопирован! Отправь его друзьям.");
            });
        }

        loadData();
        updateDisplay();
    </script>
</body>
</html>
